  </head>
  <body>
    <div id="root">
      <div id="splash" style="
        min-height:100vh;
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        background:hsl(210 20% 7%);
        padding:2rem;
        text-align:center;
        opacity:1;
        transition:opacity .6s ease-out;
      ">
        <p id="splash-quote" style="font-family:'big-caslon-fb','Georgia',serif;font-style:italic;font-size:1.45rem;max-width:30rem;line-height:1.8;color:hsl(210 8% 50%);">
        </p>
        <p id="splash-attr" style="font-family:'rig-sans',system-ui,sans-serif;margin-top:.75rem;font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;color:hsl(145 100% 44%);">
        </p>
        <div style="margin-top:2rem;width:20px;height:20px;border:2px solid hsl(145 100% 44%);border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;"></div>
      </div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
